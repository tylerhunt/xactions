services:
  xactions:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.xactions.rule=Host(`${PHX_HOST}`)"
      - "traefik.http.routers.xactions.entrypoints=websecure"
      - "traefik.http.routers.xactions.tls=true"
      - "traefik.http.routers.xactions.tls.certresolver=letsencrypt"
      - "traefik.http.services.xactions.loadbalancer.server.port=4000"
    networks:
      - traefik

networks:
  traefik:
    external: true
